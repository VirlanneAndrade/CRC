version: "3.9"

services:
  app:
    build: .
    container_name: crc-portal-app
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      PORT: 4001
      NODE_ENV: development
      # PostgreSQL roda na maquina host (fora do Docker).
      # host.docker.internal permite que o container alcance o host.
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/crc_portal
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: crc-portal-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data

volumes:
  redisdata:
