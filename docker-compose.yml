version: "3.9"

services:
  app:
    build: .
    container_name: crc-portal-app
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      PORT: 4001
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crc_portal
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: crc-portal-db
    environment:
      POSTGRES_DB: crc_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crc-portal-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
